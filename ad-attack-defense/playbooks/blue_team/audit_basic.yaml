name: "Audit Blue Team — Basique"
description: "Audit rapide des points critiques : mots de passe, privilèges, réseau."

steps:
  - name: "Audit des mots de passe"
    module: "blue_team.audit_passwords"
    function: "run_audit"
    delay_s: 1
    stop_on_fail: false
    params: {}

  - name: "Audit des comptes à privilèges"
    module: "blue_team.audit_privileges"
    function: "run_audit"
    delay_s: 1
    stop_on_fail: false
    params: {}

  - name: "Audit réseau (LLMNR, SMB)"
    module: "blue_team.audit_network"
    function: "run_audit"
    delay_s: 1
    stop_on_fail: false
    params: {}
